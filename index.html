<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Røntgenprosedyrer</title>
  <meta name="theme-color" content="#f5f5f7">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preload" href="fonts/inter-latin-wght-normal.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="style.css?v=DEPLOY_ID">
</head>
<body>

  <header class="topbar">
    <div class="topbar-actions">
    <button id="vindu-toggle" class="theme-toggle" aria-label="Hvordan dokumentene åpnes">
      <svg id="icon-nytt" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13.5V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h5.5"></path>
        <path d="M14.5 3H21v6.5"></path><path d="M10.5 13.5 21 3"></path>
      </svg>
      <svg id="icon-full" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="hidden">
        <path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"></path>
      </svg>
      <svg id="icon-halv" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" class="hidden">
        <rect x="3" y="4" width="18" height="16" rx="2.5"></rect>
        <path d="M13 4h6a2.5 2.5 0 0 1 2 2.5v11a2.5 2.5 0 0 1-2 2.5h-6z" fill="currentColor" stroke="none"></path>
      </svg>
    </button>
    <button id="theme-toggle" class="theme-toggle" title="Bytt mellom lyst og mørkt tema" aria-label="Bytt tema">
      <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path>
      </svg>
      <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" class="hidden">
        <circle cx="12" cy="12" r="4.4"></circle>
        <path d="M12 2.5v2.2M12 19.3v2.2M2.5 12h2.2M19.3 12h2.2M4.9 4.9l1.6 1.6M17.5 17.5l1.6 1.6M4.9 19.1l1.6-1.6M17.5 6.5l1.6-1.6"></path>
      </svg>
    </button>
    </div>
  </header>

  <section class="hero">
    <img class="logo" src="logo.png" alt="Røntgenprosedyrer">
    <div id="spotlight" class="spotlight">
      <div class="spotlight-field">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line>
        </svg>
        <input id="search" type="text" placeholder="Søk i alle prosedyrer" autocomplete="off" spellcheck="false">
        <kbd class="search-kbd">/</kbd>
      </div>
      <div id="spotlight-results" class="spotlight-results hidden" role="listbox"></div>
    </div>

    <div class="segmented" role="tablist" aria-label="Gruppe">
      <div id="segment-glider" class="segment-glider"></div>
      <button class="segment" data-gruppe="voksen" role="tab">Voksen</button>
      <button class="segment" data-gruppe="barn" role="tab">Barn</button>
      <button class="segment" data-gruppe="annet" role="tab">Annet</button>
    </div>
  </section>

  <main id="board" class="board" aria-live="polite"></main>

  <div id="backdrop" class="backdrop hidden"></div>

  <!-- Slank statuslinje nederst når dokumentserveren ikke nås -->
  <div id="net-banner" class="statuslinje hidden" role="status">
    <span class="toast-dot"></span>
    <span>Ingen kontakt med sykehusets dokumentserver &ndash; prosedyrene kan bare åpnes fra sykehusets nettverk.</span>
    <button id="net-retry" class="toast-retry" title="Sjekk tilkoblingen på nytt">Prøv igjen</button>
    <button id="net-lukk" class="toast-lukk" title="Lukk varselet" aria-label="Lukk varselet">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="6" y1="6" x2="18" y2="18"></line><line x1="18" y1="6" x2="6" y2="18"></line>
      </svg>
    </button>
  </div>

</body>
<script src="app.js?v=DEPLOY_ID"></script>
</html>
