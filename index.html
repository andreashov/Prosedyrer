<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Røntgenprosedyrer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩻</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topbar">
    <span class="brand">Røntgenprosedyrer</span>
    <button id="theme-toggle" class="theme-toggle" title="Bytt mellom lyst og mørkt tema" aria-label="Bytt tema">
      <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path>
      </svg>
      <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" class="hidden">
        <circle cx="12" cy="12" r="4.4"></circle>
        <path d="M12 2.5v2.2M12 19.3v2.2M2.5 12h2.2M19.3 12h2.2M4.9 4.9l1.6 1.6M17.5 17.5l1.6 1.6M4.9 19.1l1.6-1.6M17.5 6.5l1.6-1.6"></path>
      </svg>
    </button>
  </header>

  <!-- Varsel når sykehusets dokumentserver ikke nås -->
  <div id="net-banner" class="net-banner hidden">
    <span>⚠️&ensp;Ingen kontakt med sykehusets dokumentserver &ndash; prosedyrene kan bare åpnes fra sykehusets nettverk.</span>
    <button id="net-retry" class="net-retry">Prøv igjen</button>
  </div>

  <section class="hero">
    <div id="spotlight" class="spotlight">
      <div class="spotlight-field">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line>
        </svg>
        <input id="search" type="text" placeholder="Søk i alle prosedyrer" autocomplete="off" spellcheck="false">
        <kbd class="search-kbd">/</kbd>
      </div>
      <div id="spotlight-results" class="spotlight-results hidden" role="listbox"></div>
    </div>

    <div class="segmented" role="tablist" aria-label="Gruppe">
      <div id="segment-glider" class="segment-glider"></div>
      <button class="segment" data-gruppe="voksen" role="tab">Voksen</button>
      <button class="segment" data-gruppe="barn" role="tab">Barn</button>
      <button class="segment" data-gruppe="annet" role="tab">Annet</button>
    </div>
  </section>

  <main id="board" class="board" aria-live="polite"></main>

  <div id="backdrop" class="backdrop hidden"></div>

</body>
<script src="app.js"></script>
</html>
