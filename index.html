<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Røntgenprosedyrer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩻</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">🩻</div>
      <div class="brand-text">
        <h1>Røntgenprosedyrer</h1>
        <span>Dokumentene åpnes i eget vindu</span>
      </div>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line>
      </svg>
      <input id="search" type="search" placeholder="Søk etter prosedyre …" autocomplete="off">
    </div>

    <button id="theme-toggle" class="theme-toggle" title="Bytt mellom lyst og mørkt tema">
      <span class="theme-icon">🌙</span>
    </button>
  </header>

  <!-- Varsel når sykehusets dokumentserver ikke nås -->
  <div id="net-banner" class="net-banner hidden">
    <span class="net-banner-icon">⚠️</span>
    <span class="net-banner-text">
      Ingen kontakt med sykehusets dokumentserver. Prosedyrene kan bare
      åpnes fra sykehusets nettverk.
    </span>
    <button id="net-retry" class="net-retry">Prøv igjen</button>
  </div>

  <main id="grid" class="grid" aria-label="Prosedyrer etter kroppsregion"></main>

  <div id="no-results" class="no-results hidden">
    Ingen prosedyrer samsvarer med søket.
  </div>

</body>
<script src="app.js"></script>
</html>
